  <body>
    <div id="root"></div>

 <script>
  (function () {
    const path = window.location.pathname; // e.g., "/mtonline-dev.com/About"
    const hash = window.location.hash;     // e.g., ""
    const base = "";

    // Only redirect if NOT homepage and no hash yet
    const isHome = path === base || path === base + "/";
    if (!isHome && !hash) {
      const subPath = path.substring(base.length); // "/About"
      const newUrl = window.location.origin + base + "/#" + subPath;
      window.location.replace(newUrl);
    }
  })();
</script>
